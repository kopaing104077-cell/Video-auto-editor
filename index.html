<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio Pro - Stable</title>
    <script src="coi-serviceworker.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: sans-serif; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; }
    </style>
</head>
<body class="p-5">
    <div class="max-w-xl mx-auto space-y-6">
        <div class="card p-6 shadow-xl">
            <h1 class="text-2xl font-bold text-blue-400 mb-4 text-center">AI Video Editor Studio</h1>
            
            <div class="space-y-4 text-sm">
                <div>
                    <label class="block mb-1 font-semibold text-gray-400">Video (MP4):</label>
                    <input type="file" id="vIn" accept="video/mp4" class="w-full p-2 bg-gray-900 border border-gray-700 rounded">
                </div>
                <div>
                    <label class="block mb-1 font-semibold text-gray-400">Audio (MP3):</label>
                    <input type="file" id="aIn" accept="audio/mp3" class="w-full p-2 bg-gray-900 border border-gray-700 rounded">
                </div>
                <div>
                    <label class="block mb-1 font-semibold text-gray-400">Logo (PNG):</label>
                    <input type="file" id="lIn" accept="image/png" class="w-full p-2 bg-gray-900 border border-gray-700 rounded">
                </div>
                
                <button id="runBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all">
                    Start AI Rendering
                </button>
            </div>

            <div id="status" class="mt-4 text-center text-xs font-mono text-yellow-500 hidden">
                <i class="fa-solid fa-spinner fa-spin mr-2"></i> <span id="msg">Initializing...</span>
            </div>
        </div>

        <div id="result" class="hidden card p-4">
            <video id="vOut" controls class="w-full rounded-lg bg-black"></video>
            <div class="mt-4 p-4 bg-gray-900 rounded-lg text-xs border-l-4 border-green-500">
                <p class="font-bold text-green-400 uppercase mb-2">AI Marketing Kit</p>
                <p id="metaTitle" class="text-white font-semibold mb-1"></p>
                <p id="metaDesc" class="text-gray-400 mb-2"></p>
                <p id="metaTags" class="text-blue-400"></p>
            </div>
            <a id="dlBtn" class="block w-full text-center bg-green-600 mt-4 py-2 rounded font-bold">Download Video</a>
        </div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true, 
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js' 
        });

        const runBtn = document.getElementById('runBtn');
        const status = document.getElementById('status');
        const msg = document.getElementById('msg');

        runBtn.onclick = async () => {
            const vFile = document.getElementById('vIn').files[0];
            const aFile = document.getElementById('aIn').files[0];
            const lFile = document.getElementById('lIn').files[0];

            if(!vFile) return alert("ဗီဒီယို အရင်ရွေးပါ");

            runBtn.disabled = true;
            status.classList.remove('hidden');
            
            try {
                if (!ffmpeg.isLoaded()) {
                    msg.innerText = "Connecting Engine...";
                    await ffmpeg.load();
                }

                msg.innerText = "Loading Files...";
                ffmpeg.FS('writeFile', 'v.mp4', await fetchFile(vFile));
                
                let cmd = ['-i', 'v.mp4'];
                let hasAudio = false;
                let hasLogo = false;

                if (lFile) {
                    ffmpeg.FS('writeFile', 'l.png', await fetchFile(lFile));
                    cmd.push('-i', 'l.png');
                    hasLogo = true;
                }
                if (aFile) {
                    ffmpeg.FS('writeFile', 'a.mp3', await fetchFile(aFile));
                    cmd.push('-i', 'a.mp3');
                    hasAudio = true;
                }

                msg.innerText = "Processing Video (Please Wait)...";

                // 🔥 Memory Optimized Command
                let filter = '';
                if(hasLogo) filter = '[1:v]scale=100:-1[logo];[0:v][logo]overlay=W-w-10:10';

                let finalArgs = [...cmd];
                if(hasLogo) {
                    finalArgs.push('-filter_complex', filter);
                }

                if(hasAudio) {
                    finalArgs.push('-map', hasLogo ? '[v]' : '0:v');
                    finalArgs.push('-map', (hasLogo ? '2:a' : '1:a'));
                } else {
                    finalArgs.push('-an'); // Mute if no audio provided
                }

                // ⚡ Optimization for Mobile
                finalArgs.push('-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '28', '-c:a', 'aac', '-shortest', 'out.mp4');

                await ffmpeg.run(...finalArgs);

                // Check if file exists
                const files = ffmpeg.FS('readdir', '/');
                if (!files.includes('out.mp4')) {
                    throw new Error("Render Failed - Memory Full");
                }

                const data = ffmpeg.FS('readFile', 'out.mp4');
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                document.getElementById('vOut').src = url;
                document.getElementById('dlBtn').href = url;
                document.getElementById('dlBtn').download = "ai_video.mp4";
                
                document.getElementById('metaTitle').innerText = "Incredible transformation! ✨";
                document.getElementById('metaDesc').innerText = "Check out this AI-powered edit. Content made easier with automation.";
                document.getElementById('metaTags').innerText = "#viral #ai #editing #pro";

                document.getElementById('result').classList.remove('hidden');
                msg.innerText = "Finished!";

                // Cleanup
                ffmpeg.FS('unlink', 'v.mp4');
                if(hasLogo) ffmpeg.FS('unlink', 'l.png');
                if(hasAudio) ffmpeg.FS('unlink', 'a.mp3');

            } catch (e) {
                console.error(e);
                alert("Error: ဖုန်းရဲ့ RAM မလောက်လို့ ဖြစ်နိုင်ပါတယ်။ ဖိုင်ဆိုဒ် ပိုသေးတာနဲ့ စမ်းကြည့်ပါ။");
                msg.innerText = "Process Stopped.";
            } finally {
                runBtn.disabled = false;
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Auto-Editor & Metadata Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-5 md:p-10">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-blue-400 text-center">Video Auto-Editor & Marketer</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass p-6 rounded-2xl">
                <h2 class="text-xl font-semibold mb-4 text-pink-400">1. Video Settings</h2>
                
                <div class="mb-4">
                    <label class="block mb-2 text-sm">Upload Video (မူရင်းဗီဒီယို):</label>
                    <input type="file" id="videoInput" accept="video/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                </div>

                <div class="mb-4">
                    <label class="block mb-2 text-sm">Upload Logo (ညာဘက်အပေါ်ထောင့်အတွက်):</label>
                    <input type="file" id="logoInput" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-pink-600 file:text-white hover:file:bg-pink-700">
                </div>

                <button id="processBtn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition shadow-lg">
                    ဗီဒီယိုကို Edit လုပ်မည်
                </button>
                <p id="status" class="mt-3 text-xs text-yellow-400 font-mono"></p>
            </div>

            <div class="glass p-6 rounded-2xl">
                <h2 class="text-xl font-semibold mb-4 text-blue-400">2. Metadata Output</h2>
                <div id="metadataBox" class="hidden">
                    <div class="mb-4">
                        <label class="text-xs text-gray-400 italic">Title:</label>
                        <p id="resTitle" class="text-sm font-bold text-white"></p>
                    </div>
                    <div class="mb-4">
                        <label class="text-xs text-gray-400 italic">Description:</label>
                        <p id="resDesc" class="text-xs text-gray-300"></p>
                    </div>
                    <div class="mb-4">
                        <label class="text-xs text-gray-400 italic">Hashtags:</label>
                        <p id="resTags" class="text-sm text-blue-300 font-mono"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-10 glass p-6 rounded-2xl flex flex-col items-center">
            <h2 class="text-xl font-semibold mb-4">Preview (ရလဒ်ဗီဒီယို)</h2>
            <video id="outputVideo" controls class="w-full max-h-[400px] rounded-lg shadow-2xl bg-black"></video>
            <a id="downloadBtn" class="hidden mt-4 bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600">Video ကို သိမ်းမည်</a>
        </div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });

        const processBtn = document.getElementById('processBtn');
        const status = document.getElementById('status');
        const outputVideo = document.getElementById('outputVideo');
        const downloadBtn = document.getElementById('downloadBtn');

        processBtn.addEventListener('click', async () => {
            const videoFile = document.getElementById('videoInput').files[0];
            const logoFile = document.getElementById('logoInput').files[0];

            if (!videoFile) return alert("ဗီဒီယိုဖိုင် အရင်ရွေးပေးပါ!");

            status.innerText = "FFmpeg ကို Loading လုပ်နေသည်...";
            if (!ffmpeg.isLoaded()) await ffmpeg.load();

            status.innerText = "Video ကို Process လုပ်နေသည် (ခဏစောင့်ပါ)...";

            // Write files to memory
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(videoFile));
            let ffmpegCommand = '';

            if (logoFile) {
                ffmpeg.FS('writeFile', 'logo.png', await fetchFile(logoFile));
                // Command: Remove original audio, overlay logo at top-right
                // -an = remove audio
                // overlay=W-w-10:10 = position 10px from right and top
                ffmpegCommand = ['-i', 'input.mp4', '-i', 'logo.png', '-filter_complex', 'overlay=W-w-10:10', '-an', 'output.mp4'];
            } else {
                ffmpegCommand = ['-i', 'input.mp4', '-an', 'output.mp4'];
            }

            await ffmpeg.run(...ffmpegCommand);

            // Read the result
            const data = ffmpeg.FS('readFile', 'output.mp4');
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            
            outputVideo.src = url;
            downloadBtn.href = url;
            downloadBtn.download = 'edited_video.mp4';
            downloadBtn.classList.remove('hidden');

            generateMetadata(videoFile.name);
            status.innerText = "Edit လုပ်ခြင်း ပြီးဆုံးပါပြီ။";
        });

        function generateMetadata(filename) {
            document.getElementById('metadataBox').classList.remove('hidden');
            
            // Dummy logic for viral metadata
            const titles = ["ဒါကို သင်သိပြီးပြီလား?", "လူတိုင်းကြည့်သင့်တဲ့ အမိုက်စားဗီဒီယို", "နောက်ဆုံးပေါ် နည်းပညာအကြောင်း", "ကြည့်ပြီးရင် Share ဖို့မမေ့နဲ့ဦး!"];
            const selectedTitle = titles[Math.floor(Math.random() * titles.length)];

            document.getElementById('resTitle').innerText = selectedTitle + " - " + filename.split('.')[0];
            document.getElementById('resDesc').innerText = "ဒီဗီဒီယိုက သင့်အတွက် ဗဟုသုတ တစ်ခုခု ပေးနိုင်မှာပါ။ အဆုံးထိ ကြည့်ပေးလို့ ကျေးဇူးတင်ပါတယ်။ အသစ်သစ်သော ဗီဒီယိုတွေအတွက် Follow လုပ်ထားပေးပါ။";
            document.getElementById('resTags').innerText = "#viral #foryou #myanmar #trending #education #foryoupage";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Editor - Stable Version</title>
    
    <script src="coi-serviceworker.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        body { background-color: #0b0f1a; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-2xl mx-auto">
        <div class="glass p-8 rounded-3xl mt-10 shadow-2xl">
            <h1 class="text-2xl font-bold text-center text-blue-400 mb-6">AI Video Auto-Editor</h1>
            
            <div class="space-y-5">
                <div>
                    <label class="text-sm text-gray-400">Video ရွေးပါ:</label>
                    <input type="file" id="videoInput" accept="video/*" class="w-full mt-1">
                </div>
                <div>
                    <label class="text-sm text-gray-400">Logo ရွေးပါ (PNG):</label>
                    <input type="file" id="logoInput" accept="image/png" class="w-full mt-1">
                </div>
                
                <button id="processBtn" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 py-3 rounded-xl font-bold">
                    ဗီဒီယို ပြုပြင်မည်
                </button>
            </div>

            <div id="status" class="mt-4 text-center text-xs text-yellow-500 font-mono italic"></div>
        </div>

        <div class="mt-8">
            <video id="outputVideo" controls class="w-full rounded-2xl hidden shadow-2xl"></video>
            <div id="metadata" class="hidden glass p-5 rounded-2xl mt-4 border-l-4 border-blue-500"></div>
        </div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        
        // Configuration ကို ပိုမိုတည်ငြိမ်သော Core သို့ ပြောင်းလဲထားသည်
        const ffmpeg = createFFmpeg({ 
            log: true,
            mainName: 'main',
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
        });

        const btn = document.getElementById('processBtn');
        const status = document.getElementById('status');

        btn.addEventListener('click', async () => {
            const videoFile = document.getElementById('videoInput').files[0];
            const logoFile = document.getElementById('logoInput').files[0];

            if (!videoFile) return alert("Video အရင်ရွေးပါ");

            btn.disabled = true;
            btn.innerText = "Processing...";
            
            try {
                if (!ffmpeg.isLoaded()) {
                    status.innerText = "Connecting to AI Engine (FFmpeg)...";
                    await ffmpeg.load();
                }

                status.innerText = "Video ကို စစ်ဆေးနေသည်...";
                ffmpeg.FS('writeFile', 'video.mp4', await fetchFile(videoFile));

                let filter = '-an'; // Default: Mute audio
                if (logoFile) {
                    status.innerText = "Logo ကပ်နေသည်...";
                    ffmpeg.FS('writeFile', 'logo.png', await fetchFile(logoFile));
                    // Scale logo and put top-right
                    await ffmpeg.run('-i', 'video.mp4', '-i', 'logo.png', '-filter_complex', '[1:v]scale=100:-1[wm];[0:v][wm]overlay=main_w-wc-10:10', '-an', '-c:a', 'copy', 'out.mp4');
                } else {
                    await ffmpeg.run('-i', 'video.mp4', '-an', 'out.mp4');
                }

                status.innerText = "Rendering ပြီးစီးပါပြီ!";
                const data = ffmpeg.FS('readFile', 'out.mp4');
                const videoSrc = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                const outVid = document.getElementById('outputVideo');
                outVid.src = videoSrc;
                outVid.classList.remove('hidden');

                // Marketing Text
                const meta = document.getElementById('metadata');
                meta.innerHTML = `<h3 class='text-blue-400 font-bold'>Suggested Title</h3><p class='text-sm mt-1'>🔥 ဒါကတော့ အလန်းစားပဲဗျာ! #viral #trending</p>`;
                meta.classList.remove('hidden');

            } catch (e) {
                console.error(e);
                status.innerText = "Error: " + e.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "ဗီဒီယို ပြုပြင်မည်";
            }
        });
    </script>
</body>
</html>

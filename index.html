<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro AI Video Studio</title>
    
    <script src="coi-serviceworker.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { background-color: #050505; color: #f4f4f5; font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .accent-border { border-left: 4px solid #3b82f6; }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex flex-col items-center">

    <div class="w-full max-w-5xl">
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-purple-500 mb-2">
                AI VIDEO STUDIO
            </h1>
            <p class="text-gray-500 text-sm italic">Automated Video Retouching & AI Metadata Engine</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="glass p-8 space-y-6 shadow-2xl">
                <h2 class="text-xl font-bold flex items-center text-blue-400">
                    <i class="fa-solid fa-gear mr-3"></i> Studio Configurations
                </h2>

                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">1. Main Video File</label>
                        <input type="file" id="videoInput" accept="video/*" class="w-full bg-black/40 p-3 rounded-xl border border-white/10 text-xs">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-indigo-400 uppercase mb-2">2. English Voiceover (MP3)</label>
                        <input type="file" id="audioInput" accept="audio/*" class="w-full bg-black/40 p-3 rounded-xl border border-white/10 text-xs">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-pink-400 uppercase mb-2">3. Brand Logo (PNG)</label>
                        <input type="file" id="logoInput" accept="image/png" class="w-full bg-black/40 p-3 rounded-xl border border-white/10 text-xs">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-green-400 uppercase mb-2">4. Video Topic (SEO Context)</label>
                        <input type="text" id="topicInput" placeholder="e.g. Space exploration" class="w-full bg-black/40 p-3 rounded-xl border border-white/10 text-xs outline-none focus:border-blue-500">
                    </div>
                </div>

                <button id="processBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 py-4 rounded-2xl font-bold text-lg transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> RENDER VIDEO
                </button>

                <div id="statusBox" class="hidden flex items-center justify-center p-4 bg-white/5 rounded-xl space-x-3">
                    <i class="fa-solid fa-circle-notch loading-spin text-blue-500"></i>
                    <span id="statusText" class="text-xs font-mono text-yellow-500 uppercase tracking-widest">Initialising...</span>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass p-4 min-h-[300px] flex flex-col items-center justify-center relative">
                    <div id="emptyState" class="text-gray-600 text-center">
                        <i class="fa-solid fa-clapperboard text-5xl mb-3"></i>
                        <p class="text-sm">Processed video will appear here</p>
                    </div>
                    <video id="outputVideo" controls class="hidden w-full rounded-xl shadow-2xl bg-black aspect-video"></video>
                    <a id="downloadBtn" class="hidden mt-6 bg-green-600 hover:bg-green-700 px-8 py-3 rounded-full font-bold text-sm items-center shadow-xl">
                        <i class="fa-solid fa-download mr-2"></i> DOWNLOAD MP4
                    </a>
                </div>

                <div id="metadataBox" class="hidden glass p-6 accent-border">
                    <h3 class="text-lg font-bold mb-4 flex items-center"><i class="fa-solid fa-fire text-orange-500 mr-2"></i> Viral Kit</h3>
                    <div class="space-y-4">
                        <div class="bg-black/40 p-3 rounded-lg">
                            <span class="text-[10px] text-blue-400 font-bold uppercase">Optimized Title</span>
                            <p id="resTitle" class="text-sm text-white mt-1"></p>
                        </div>
                        <div class="bg-black/40 p-3 rounded-lg">
                            <span class="text-[10px] text-pink-400 font-bold uppercase">Engagement Description</span>
                            <p id="resDesc" class="text-xs text-gray-400 mt-1 leading-relaxed"></p>
                        </div>
                        <div class="bg-black/40 p-3 rounded-lg">
                            <span class="text-[10px] text-green-400 font-bold uppercase">Hashtags</span>
                            <p id="resTags" class="text-xs text-blue-300 mt-1 font-mono"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true, 
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js' 
        });

        const btn = document.getElementById('processBtn');
        const statusBox = document.getElementById('statusBox');
        const statusText = document.getElementById('statusText');
        const outputVideo = document.getElementById('outputVideo');
        const downloadBtn = document.getElementById('downloadBtn');
        const metadataBox = document.getElementById('metadataBox');
        const emptyState = document.getElementById('emptyState');

        btn.addEventListener('click', async () => {
            const videoFile = document.getElementById('videoInput').files[0];
            const audioFile = document.getElementById('audioInput').files[0];
            const logoFile = document.getElementById('logoInput').files[0];
            const topic = document.getElementById('topicInput').value || "Amazing Content";

            if (!videoFile) return alert("Please select a video!");

            btn.disabled = true;
            statusBox.classList.remove('hidden');
            metadataBox.classList.add('hidden');
            outputVideo.classList.add('hidden');
            downloadBtn.classList.add('hidden');
            emptyState.classList.remove('hidden');

            try {
                if (!ffmpeg.isLoaded()) {
                    statusText.innerText = "Loading Engine...";
                    await ffmpeg.load();
                }

                statusText.innerText = "Importing Files...";
                ffmpeg.FS('writeFile', 'vid.mp4', await fetchFile(videoFile));

                let args = ['-i', 'vid.mp4'];
                let filter = '';
                let hasLogo = false;
                let hasAudio = false;

                if (logoFile) {
                    ffmpeg.FS('writeFile', 'logo.png', await fetchFile(logoFile));
                    args.push('-i', 'logo.png');
                    hasLogo = true;
                }

                if (audioFile) {
                    ffmpeg.FS('writeFile', 'aud.mp3', await fetchFile(audioFile));
                    args.push('-i', 'aud.mp3');
                    hasAudio = true;
                }

                statusText.innerText = "Rendering (Be Patient)...";

                // Complex Processing Command
                if (hasLogo && hasAudio) {
                    // Logic: Replace Audio + Add Logo
                    await ffmpeg.run(
                        ...args,
                        '-filter_complex', '[1:v]scale=120:-1[wm];[0:v][wm]overlay=W-w-15:15[v]',
                        '-map', '[v]', '-map', '2:a', 
                        '-c:v', 'libx264', '-c:a', 'aac', 
                        '-preset', 'ultrafast', '-shortest', 'out.mp4'
                    );
                } else if (hasLogo && !hasAudio) {
                    // Logic: Remove Audio + Add Logo
                    await ffmpeg.run(
                        ...args,
                        '-filter_complex', '[1:v]scale=120:-1[wm];[0:v][wm]overlay=W-w-15:15',
                        '-preset', 'ultrafast', '-an', 'out.mp4'
                    );
                } else if (!hasLogo && hasAudio) {
                    // Logic: Replace Audio Only
                    await ffmpeg.run(
                        ...args,
                        '-map', '0:v', '-map', '1:a', 
                        '-c:v', 'copy', '-c:a', 'aac', 
                        '-shortest', 'out.mp4'
                    );
                } else {
                    // Logic: Mute Video Only
                    await ffmpeg.run('-i', 'vid.mp4', '-an', '-c:v', 'copy', 'out.mp4');
                }

                // Finalize
                const data = ffmpeg.FS('readFile', 'out.mp4');
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                emptyState.classList.add('hidden');
                outputVideo.src = url;
                outputVideo.classList.remove('hidden');
                downloadBtn.href = url;
                downloadBtn.download = `AI_Studio_${Date.now()}.mp4`;
                downloadBtn.classList.remove('hidden');
                downloadBtn.classList.add('flex');

                generateAIStats(topic);
                metadataBox.classList.remove('hidden');
                statusText.innerText = "Done!";

            } catch (err) {
                console.error(err);
                alert("Render Error: Try a smaller video file.");
            } finally {
                btn.disabled = false;
                setTimeout(() => statusBox.classList.add('hidden'), 2000);
            }
        });

        function generateAIStats(topic) {
            const t = topic.toUpperCase();
            document.getElementById('resTitle').innerText = `How ${t} is Changing Everything! 😱 (MUST WATCH)`;
            document.getElementById('resDesc').innerText = `The secrets behind ${topic} revealed. We replaced the original audio for a professional experience. Subscribe for more AI-edited content like this!`;
            document.getElementById('resTags').innerText = `#${topic.replace(/\s/g, '')} #viral #trending #technology #fyp #ai #videoediting`;
        }
    </script>
</body>
</html>
